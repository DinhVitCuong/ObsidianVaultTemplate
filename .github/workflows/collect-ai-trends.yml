name: Collect AI Trends

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout vault
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-trending.txt

      - name: Collect Python GitHub Trending
        run: |
          python scripts/collect_github_trending.py

      - name: Collect Hugging Face Hub Trends
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/collect_hf_hub_trends.py

      - name: Commit trend notes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Inbox/GitHubTrending/
          git add Inbox/HuggingFaceHub/

          if git diff --cached --quiet; then
            echo "No trend changes to commit."
          else
            git commit -m "Collect AI trend signals"
            git push
          fi
